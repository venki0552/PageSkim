<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>灯台の歴史</title>
  <meta name="description" content="灯台の歴史は古代エジプトのファロス島から始まり、現代の自動化された無人灯台まで続いている。">
</head>
<body>
  <main>
    <h1 id="灯台の歴史">灯台の歴史</h1>
    <p>灯台の歴史は古代エジプトのファロス島から始まる。アレクサンドリアの大灯台は紀元前三世紀に建てられ、千五百年以上にわたって船乗りたちを港へ導いた。</p>
    <h2 id="古代の灯台">古代の灯台</h2>
    <p>古代の灯台は昼は鏡で日光を反射し、夜は火を燃やして光を放った。燃料は螺旋状の坂道を通って頂上まで運ばれたと伝えられている。</p>
    <h2 id="現代の灯台">現代の灯台</h2>
    <p>現代の灯台はほぼすべて自動化されており、太陽電池とLEDランプで動作する。灯台守という職業は二十世紀の終わりまでにほとんど姿を消した。</p>
  </main>
</body>
</html>
