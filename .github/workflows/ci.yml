name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Lint, test, build (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  python:
    name: Test (Python bench)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bench
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest
